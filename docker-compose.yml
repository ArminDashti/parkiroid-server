services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "${LIVEKIT_HOST_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_RTC_UDP_PORT:-7882}:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  parkiroid-server:
    build: .
    depends_on:
      - livekit
    ports:
      - "${PARKIROID_HOST_PORT:-8080}:8080"
    environment:
      PARKIROID_LISTEN_ADDRESS: ":8080"
      PARKIROID_EMBEDDED_API_TOKEN: ${PARKIROID_EMBEDDED_API_TOKEN:-pk_dev_a8f3c2e1b9d74f6a0e5c3b9d2f7a1e4c8b6d0f3a7e2c9b5d1f8a4e6c0b3d7f9}
      PARKIROID_JWT_SECRET: ${PARKIROID_JWT_SECRET:-parkiroid-dev-jwt-secret}
      PARKIROID_TOKEN_TTL: ${PARKIROID_TOKEN_TTL:-86400}
      PARKIROID_DATABASE_PATH: /data/parkiroid.db
      PARKIROID_FRAMES_DIR: /data/frames
      PARKIROID_LIVEKIT_URL: ${PARKIROID_LIVEKIT_URL:-ws://localhost:7880}
      PARKIROID_LIVEKIT_API_KEY: ${PARKIROID_LIVEKIT_API_KEY:-devkey}
      PARKIROID_LIVEKIT_API_SECRET: ${PARKIROID_LIVEKIT_API_SECRET:-secret}
      PARKIROID_LIVEKIT_TOKEN_TTL: ${PARKIROID_LIVEKIT_TOKEN_TTL:-3600}
    volumes:
      - parkiroid-data:/data
    restart: unless-stopped

volumes:
  parkiroid-data:
