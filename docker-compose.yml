name: dogan

services:
  dogan-pgsql:
    image: postgres:16-alpine
    container_name: dogan-pgsql
    environment:
      POSTGRES_DB: dogan
      POSTGRES_USER: dogan
      POSTGRES_PASSWORD: dogan
    volumes:
      - dogan-pgsql-vol:/var/lib/postgresql/data
    networks:
      - t3-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dogan -d dogan"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    expose:
      - "5432"

  dogan-livekit:
    image: livekit/livekit-server:latest
    container_name: dogan-livekit
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
      - dogan-livekit-vol:/data
    networks:
      - t3-net
    restart: unless-stopped
    expose:
      - "7880"
      - "7881"
      - "7882"

  dogan-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE_TAG:-dogan-api:latest}
    container_name: dogan-api
    depends_on:
      dogan-pgsql:
        condition: service_healthy
      dogan-livekit:
        condition: service_started
    expose:
      - "8080"
    ports:
      - target: 8080
        published: ${DOGAN_PUBLISH_PORT-8080}
        protocol: tcp
    environment:
      DOGAN_LISTEN_ADDRESS: ":8080"
      DOGAN_EMBEDDED_API_TOKEN: ${DOGAN_EMBEDDED_API_TOKEN:-dg_dev_a8f3c2e1b9d74f6a0e5c3b9d2f7a1e4c8b6d0f3a7e2c9b5d1f8a4e6c0b3d7f9}
      DOGAN_DEVICE_API_KEY: ${DOGAN_DEVICE_API_KEY:-dogan-dev-key}
      DOGAN_JWT_SECRET: ${DOGAN_JWT_SECRET:-dogan-dev-jwt-secret}
      DOGAN_TOKEN_TTL: ${DOGAN_TOKEN_TTL:-86400}
      DOGAN_DATABASE_URL: postgres://dogan:dogan@dogan-pgsql:5432/dogan?sslmode=disable
      DOGAN_FRAMES_DIR: /data/frames
      DOGAN_MODELS_DIR: /data/models
      DOGAN_LIVEKIT_URL: ${DOGAN_LIVEKIT_URL:-ws://dogan-livekit:7880}
      DOGAN_LIVEKIT_PUBLIC_URL: ${DOGAN_LIVEKIT_PUBLIC_URL:-wss://dogan-livekit.xaigrok.ir}
      DOGAN_LIVEKIT_API_KEY: ${DOGAN_LIVEKIT_API_KEY:-devkey}
      DOGAN_LIVEKIT_API_SECRET: ${DOGAN_LIVEKIT_API_SECRET:-secret}
      DOGAN_LIVEKIT_TOKEN_TTL: ${DOGAN_LIVEKIT_TOKEN_TTL:-3600}
      DOGAN_CORS_ALLOWED_ORIGINS: ${DOGAN_CORS_ALLOWED_ORIGINS:-http://localhost:30808,http://127.0.0.1:30808,https://dogan.xaigrok.ir}
    volumes:
      - dogan-api-vol:/data
    networks:
      - t3-net
    restart: unless-stopped

networks:
  t3-net:
    name: ${DOCKER_NETWORK:-t3-net}
    external: true

volumes:
  dogan-pgsql-vol:
    name: dogan-pgsql-vol
  dogan-api-vol:
    name: dogan-api-vol
  dogan-livekit-vol:
    name: dogan-livekit-vol
